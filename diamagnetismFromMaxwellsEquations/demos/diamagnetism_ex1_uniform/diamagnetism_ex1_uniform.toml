# This is a configuration file for PyPIC3D
[simulation_parameters]
name = "Uniform B-field in the x-direction"
x_wind = 1
y_wind = 1
z_wind = 1
t_wind = 5e-8
solver = 'fdtd'
Nx = 50
Ny = 10
Nz = 10
verbose = false
electrostatic = false
cfl = 0.99
shape_factor = 2
current_calculation = "j_from_rhov"
alpha = 1.0
relativistic = true
output_dir = 'data'

[plotting]
plotting_interval = 8
plot_phasespace = true
plot_fields = false
dump_particles = false
plot_openpmd_fields = true
plot_openpmd_particles = true

[particle1]
name = "electron1"
N_particles = 5000
charge = -1.602e-19
mass = 9.1093837e-31
vth = 116237.333301         # Room temperature
initial_vx = 5.930642e7     # 100 eV, adjust by whatever factor you want

[particle2]
name = "ion1"
N_particles = 5000
charge = 1.602e-19
mass = 1.67e-27
vth = 2712.63426455         # Room temperature

# Field types:
# 0-2: E-field (x, y, z)
# 3-5: B-field (x, y, z)
# 6-8: J-field (x, y, z)

[field1]
name = "Bx field, Uniform 1 fT"
type = 3
path = "demos/diamagnetism_ex1_uniform/Bx_uniform.npy"

[field2]
name = "By field, Zero"
type = 4
path = "demos/diamagnetism_ex1_uniform/By_zero.npy"

[field3]
name = "Bz field, Zero"
type = 5
path = "demos/diamagnetism_ex1_uniform/Bz_zero.npy"