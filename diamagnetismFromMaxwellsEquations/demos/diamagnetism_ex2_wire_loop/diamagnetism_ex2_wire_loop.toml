# This is a configuration file for PyPIC3D
[simulation_parameters]
name = "Wire-loop B-field Experiment"
x_wind = 10
y_wind = 0.05
z_wind = 0.05
t_wind = 5e-8
solver = 'fdtd'
Nx = 100
Ny = 10
Nz = 10
verbose = false
electrostatic = false
cfl = 0.99
shape_factor = 2
current_calculation = "j_from_rhov"
alpha = 1.0
relativistic = true
output_dir = 'data'

[plotting]
plotting_interval = 8
plot_phasespace = true
plot_fields = false
dump_particles = false
plot_openpmd_fields = true
plot_openpmd_particles = true

[particle1]
name = "electron_bulk"
N_particles = 1600
charge = -1.602e-19
mass = 9.1093837e-31
vth = 116237.333301         # Room temperature
initial_vx = 0              # Models electrons whose velocity has settled to a Maxwellian about 0

[particle2]
name = "electron_tail"
N_particles = 400           # Density is 1/4 of bulk density
charge = -1.602e-19
mass = 9.1093837e-31
vth = 1e7                   # Models electrons whose velocity persists outside the bulk Maxwellian, give a wide distribution as in the paper
initial_vx = 2e7            # Treat as noise on the region past two bulk v_th's away from 0

[particle3]
name = "ion1"
N_particles = 2000
charge = 1.602e-19
mass = 1.67e-27
vth = 2712.63426455         # Room temperature


# External Field Types:
# 0-2: E-field (x, y, z)
# 3-5: B-field (x, y, z)
# 6-8: J-field (x, y, z)

[field1]
name = "Bx field"
type = 3
path = "demos/diamagnetism_ex2_wire_loop/Bx_ex2.npy"

[field2]
name = "By field"
type = 4
path = "demos/diamagnetism_ex2_wire_loop/By_ex2.npy"

[field3]
name = "Bz field"
type = 5
path = "demos/diamagnetism_ex2_wire_loop/Bz_ex2.npy"